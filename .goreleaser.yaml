version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: semctl
    main: ./cmd/semctl
    binary: semctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    goarm:
      - "7"
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    flags:
      - -trimpath

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

sboms:
  - id: syft
    artifacts: archive
    documents:
      - "{{ .ArtifactName }}.sbom.json"
    cmd: syft
    args: ["$artifact", "-o", "spdx-json=$document"]

nfpms:
  - id: packages
    package_name: semctl
    vendor: semctl authors
    homepage: https://github.com/moep90/semaphore-cli
    maintainer: semctl authors
    description: A command line interface for Semaphore UI.
    license: Apache-2.0
    formats:
      - deb
      - rpm
    dependencies:
      - git
    bindir: /usr/bin
    section: utils
    priority: optional
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/semctl/LICENSE
      - src: ./NOTICE
        dst: /usr/share/doc/semctl/NOTICE

# Keyless signing with cosign via GitHub OIDC.
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - --yes
      - ${artifact}
    artifacts: all
