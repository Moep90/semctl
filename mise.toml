[tools]
go = "1.23.12"
golangci-lint = "latest"
goreleaser = "latest"
govulncheck = "latest"

[env]
CGO_ENABLED = "0"

[tasks.fmt]
run = "go fmt ./..."

[tasks.lint]
run = "golangci-lint run ./..."

[tasks.test]
run = "go test ./..."

[tasks.vuln]
run = "govulncheck ./..."

[tasks.build]
run = "go build -o bin/semctl ./cmd/semctl"

[tasks.compose-up]
run = "docker compose up -d --wait"

[tasks.compose-down]
run = "docker compose down -v"

[tasks.test-e2e]
depends = ["compose-up"]
env = { SEMAPHORE_E2E = "1" }
run = "go test -tags=e2e ./... -count=1"
