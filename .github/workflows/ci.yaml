name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.3.0
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run tests with coverage
        shell: bash
        run: |
          set -euo pipefail
          go test -race -covermode=atomic -coverprofile=coverage.out -count=1 ./... | tee coverage.txt

      - name: Coverage summary
        if: always()
        shell: bash
        run: |
          [ -f coverage.out ] || exit 0
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $NF}')
          echo "Total coverage: ${total}"
          {
            echo "## Test coverage: ${total}"
            echo ""
            echo '```'
            grep -E 'coverage:|no test files' coverage.txt \
              | sed -E 's#github.com/moep90/semaphore-cli/##' || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-profile
          path: coverage.out
          if-no-files-found: warn

      - name: Coverage floor
        shell: bash
        run: bash scripts/check-coverage.sh

      - name: Run govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          go-version-file: go.mod

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.3.0
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          # golangci-lint v2 (matches the v2 .golangci.yml and the mise.toml pin).
          version: v2.12.2

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.3.0
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Start Semaphore UI
        run: docker compose up -d --wait

      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/ping >/dev/null; then
              echo "Semaphore UI is ready"
              break
            fi
            echo "Waiting for Semaphore UI... ($i)"
            sleep 2
          done

      - name: Run E2E tests
        env:
          SEMAPHORE_E2E: "1"
        run: go test -tags=e2e ./... -count=1 -v

      - name: Stop Semaphore UI
        if: always()
        run: docker compose down -v

  # Automated release: on every push to main, once test/lint/e2e pass, compute
  # the next version from Conventional Commits and push a vX.Y.Z tag when there
  # is a version-bumping change. The tag triggers the Release workflow
  # (GoReleaser). Commits that don't bump the version (chore/docs/ci/test/
  # refactor/build) produce no tag and no release.
  release:
    needs: [test, lint, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2
        with:
          fetch-depth: 0
          fetch-tags: true
          # Use the PAT so the tag this job pushes triggers the Release workflow
          # (a GITHUB_TOKEN push would not trigger downstream workflows).
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install python-semantic-release
        run: pip install "python-semantic-release==10.5.3"

      - name: Tag release from conventional commits
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "Next version: $(semantic-release --config releaserc.toml version --print 2>/dev/null || echo 'no release')"
          # Compute version + create/push the tag only. GoReleaser (Release
          # workflow) builds artifacts and publishes the GitHub Release + notes.
          # --config is required: PSR does not auto-discover releaserc.toml, and
          # without it the defaults (allow_zero_version=false) force v1.0.0.
          semantic-release --config releaserc.toml version --no-commit --no-changelog --no-vcs-release --skip-build --tag --push
