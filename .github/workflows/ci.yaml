name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.3.0
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run tests with coverage
        shell: bash
        run: |
          set -euo pipefail
          go test -race -covermode=atomic -coverprofile=coverage.out -count=1 ./... | tee coverage.txt

      - name: Coverage summary
        if: always()
        shell: bash
        run: |
          [ -f coverage.out ] || exit 0
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $NF}')
          echo "Total coverage: ${total}"
          {
            echo "## Test coverage: ${total}"
            echo ""
            echo '```'
            grep -E 'coverage:|no test files' coverage.txt \
              | sed -E 's#github.com/moep90/semaphore-cli/##' || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-profile
          path: coverage.out
          if-no-files-found: warn

      - name: Coverage floor
        shell: bash
        run: bash scripts/check-coverage.sh

      - name: Run govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          go-version-file: go.mod

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.3.0
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@db582008a42febd596419635a5abc9d9815daa9c # v9.2.1
        with:
          # golangci-lint v2 (matches the v2 .golangci.yml and the mise.toml pin).
          version: v2.12.2

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.3.0
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Start Semaphore UI
        run: docker compose up -d --wait

      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/ping >/dev/null; then
              echo "Semaphore UI is ready"
              break
            fi
            echo "Waiting for Semaphore UI... ($i)"
            sleep 2
          done

      - name: Run E2E tests
        env:
          SEMAPHORE_E2E: "1"
        run: go test -tags=e2e ./... -count=1 -v

      - name: Stop Semaphore UI
        if: always()
        run: docker compose down -v
