name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5.3.0
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -race -count=1 ./...

      - name: Run govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          go-version-file: go.mod

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5.3.0
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6.5.2
        with:
          version: latest
          args: --timeout=5m

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5.3.0
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Start Semaphore UI
        run: docker compose up -d --wait

      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/ping >/dev/null; then
              echo "Semaphore UI is ready"
              break
            fi
            echo "Waiting for Semaphore UI... ($i)"
            sleep 2
          done

      - name: Run E2E tests
        env:
          SEMAPHORE_E2E: "1"
        run: go test -tags=e2e ./... -count=1 -v

      - name: Stop Semaphore UI
        if: always()
        run: docker compose down -v
