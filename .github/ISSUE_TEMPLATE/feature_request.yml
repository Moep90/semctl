name: Feature Request
description: Suggest a new feature or enhancement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        > **Disclaimer:** `semctl` is an independent, open-source command line interface for Semaphore UI. It is **not affiliated with, endorsed by, sponsored by, or officially connected to the Semaphore UI project or its creators**. This tool is intended for personal use, educational purposes, and operational convenience at your own risk. All product names, logos, and brands are property of their respective owners.

        Thanks for sharing your idea! Please describe the feature and the problem it solves.
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem are you trying to solve? What is missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed feature
      description: Describe the feature or change you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there existing workarounds or alternative approaches?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other notes, mockups, or references.
