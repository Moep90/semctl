repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: mixed-line-ending
      - id: detect-private-key

  - repo: local
    hooks:
      - id: go-fmt
        name: go-fmt
        entry: gofmt -l -w
        language: system
        types: [go]
        pass_filenames: true

      - id: go-vet
        name: go-vet
        entry: go vet ./...
        language: system
        types: [go]
        pass_filenames: false
        always_run: true

      - id: go-imports
        name: go-imports
        entry: goimports -l -w
        language: system
        types: [go]
        pass_filenames: true

      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run --new-from-rev HEAD
        language: system
        types: [go]
        pass_filenames: false
        always_run: true
        stages: [pre-push]
