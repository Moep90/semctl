# python-semantic-release configuration.
#
# Releases are fully automated: the CI "release" job runs `semantic-release
# version` on every push to main (after test/lint/e2e pass). It computes the
# next version from the Conventional Commit messages since the last tag and,
# when there is a version-bumping change (feat -> minor, fix -> patch,
# breaking -> see major_on_zero below), creates and pushes a vX.Y.Z tag. The
# tag push triggers the Release workflow, where GoReleaser builds the artifacts
# and publishes the GitHub Release with auto-generated notes.
#
# python-semantic-release here only computes the version and creates the tag —
# it does NOT commit, write a changelog, or create the GitHub Release itself
# (--no-commit --no-changelog --no-vcs-release in the workflow).

[semantic_release]
tag_format = "v{version}"
build_command = ""
# Stay in the 0.x series: keep zero-based versions and do not let a breaking
# change jump straight to 1.0.0 (pre-1.0, breaking changes bump the minor).
allow_zero_version = true
major_on_zero = false

[semantic_release.branches.main]
match = "main"
